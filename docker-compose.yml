# docker-compose.yml — HouseMind
# Complete local development stack:
#   postgres   → PostgreSQL 15 with persisted volume
#   localstack → S3-compatible local storage (no AWS account needed)
#   backend    → FastAPI with hot-reload
#   frontend   → Next.js with hot-reload
#
# Usage:
#   docker compose up              # start all services
#   docker compose up postgres     # database only (for local Python dev)
#   docker compose down -v         # tear down including volumes
#
# Prerequisites:
#   - Docker Desktop 4.x+
#   - Copy backend/.env.example → backend/.env
#   - Copy frontend/.env.local.example → frontend/.env.local

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: housemind
      POSTGRES_PASSWORD: housemind
      POSTGRES_DB: housemind_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U housemind -d housemind_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── LocalStack (S3 emulation) ─────────────────────────────────────────────
  localstack:
    image: localstack/localstack:3.4
    restart: unless-stopped
    environment:
      SERVICES: s3
      AWS_DEFAULT_REGION: ap-southeast-1
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
      PERSISTENCE: 1
      LOCALSTACK_VOLUME_DIR: /var/lib/localstack
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
      - ./infra/localstack/init-s3.sh:/etc/localstack/init/ready.d/init-s3.sh
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localstack:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_started
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./db:/db
      - uploads_data:/app/uploads
    command: >
      sh -c "alembic -c /db/alembic.ini upgrade head &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app"

  # ── Next.js Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - ./frontend/.env.local 
    environment:
      NEXT_PUBLIC_APP_ENV: local
      NEXT_PUBLIC_SENTRY_DSN: ""
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

  nginx:
    image: nginx:alpine
    ports:
      - "5000:5000"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  localstack_data:
  uploads_data:
